name: smart_room
version: 0.4.0
description: "Smart room engine for Marvi — presence fusion (BLE + mmWave + geofence), Tuya LAN light control, automations, and world-awareness context. Native Windows, no Docker/WSL. Replaces Home Assistant for the smart room."
author: xRetro Labs
kind: backend
platforms:
  - windows
provides_tools:
  - smart_room_state
  - smart_room_set_mode
  - smart_room_set_light
  - smart_room_cancel_sleep
  - smart_room_override
  - smart_room_health
  - smart_room_diagnostic
hooks:
  - on_gateway_start
  - on_gateway_stop
