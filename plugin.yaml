name: smart_room
version: 0.6.0
description: "Smart room engine for Marvi — presence fusion, Tuya LAN control, automations, YAMNet clap controls, and world-awareness context. Native Windows, no Docker/WSL."
author: xRetro Labs
kind: backend
platforms:
  - windows
pip_dependencies:
  - ai-edge-litert==2.1.6
  - sounddevice==0.5.5
provides_tools:
  - smart_room_state
  - smart_room_set_mode
  - smart_room_set_light
  - smart_room_cancel_sleep
  - smart_room_override
  - smart_room_health
  - smart_room_diagnostic
  - smart_room_alarm
hooks:
  - on_gateway_start
  - on_gateway_stop
